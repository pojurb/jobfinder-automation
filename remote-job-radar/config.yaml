# Configuration for Remote Job Radar

# Job search parameters
search:
  keywords:
    - "Senior Product Manager"
    - "Product Manager"
    - "VP of Product"
    - "Head of Product"
    - "Director of Product"
  locations:
    - "Remote"
    - "Worldwide"
    - "APAC"
    - "Asia"
  excluded_keywords:
    - "Junior"
    - "Intern"
    - "Entry Level"

# Per-source rate limits (ms between requests)
rate_limits:
  remotive: 500
  remoteok: 2000
  greenhouse: 500
  lever: 500
  ashby: 500

# Staleness management
staleness:
  max_failures: 3

# OpenAI configuration
openai:
  model: "gpt-4o"
  temperature: 0.2
  prompt: >
    You are an AI assistant helping Johannes Purba, a Senior Product Manager based in Indonesia,
    evaluate remote job opportunities. 
    Analyze the following job description and provide:
    1. A match score (0-100)
    2. A brief reason for the match score
