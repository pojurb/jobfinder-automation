# Configuration for Remote Job Radar

# Job search parameters
search:
  keywords:
    - "Senior Product Manager"
    - "Product Manager"
    - "VP of Product"
    - "Head of Product"
    - "Director of Product"
  locations:
    - "Remote"
    - "Worldwide"
    - "APAC"
    - "Asia"
  excluded_keywords:
    - "Junior"
    - "Intern"
    - "Entry Level"
  location_filter_mode: soft  # soft = prefer matching locations but don't reject; hard = reject non-matching

# Per-source rate limits (ms between requests)
rate_limits:
  remotive: 500
  remoteok: 2000
  greenhouse: 500
  lever: 500
  ashby: 500
  weworkremotely: 1000
  himalayas: 1000
  workatastartup: 1000
  wellfound: 2000
  workday: 500

# Staleness management
staleness:
  max_failures: 3
